name: Flutter Build APK

on:
  workflow_dispatch: # 👈 ይህ በእጅህ (Manual) ብቻ Build እንድታደርግ ይፈቅድልሃል
  # push:           # 👈 አውቶማቲክ እንዳይሆን push የሚለውን አጥፍተነዋል
  #   branches:
  #     - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Config File
        run: |
          # ቁልፎቹን ከአላስፈላጊ ክፍት ቦታዎች ያጸዳቸዋል (Trim)
          GEMINI_KEY=$(echo "${{ secrets.GEMINI_KEY }}" | tr -d '\n' | tr -d '\r')
          GROQ_KEY=$(echo "${{ secrets.GROQ_KEY }}" | tr -d '\n' | tr -d '\r')
          HF_KEY=$(echo "${{ secrets.HF_KEY }}" | tr -d '\n' | tr -d '\r')
          OPENAI_KEY=$(echo "${{ secrets.OPENAI_KEY }}" | tr -d '\n' | tr -d '\r')
          GOOGLE_CLIENT_ID=$(echo "${{ secrets.GOOGLE_CLIENT_ID }}" | tr -d '\n' | tr -d '\r')
          SUPABASE_URL=$(echo "${{ secrets.SUPABASE_URL }}" | tr -d '\n' | tr -d '\r')
          SUPABASE_ANON_KEY=$(echo "${{ secrets.SUPABASE_ANON_KEY }}" | tr -d '\n' | tr -d '\r')

          # አሁን JSON ፋይሉን በጥንቃቄ ይፈጥራል (ልክ አንተ ባልከው መንገድ)
          echo "{" > config.json
          echo "  \"GEMINI_KEY\": \"$GEMINI_KEY\"," >> config.json
          echo "  \"GROQ_KEY\": \"$GROQ_KEY\"," >> config.json
          echo "  \"HF_KEY\": \"$HF_KEY\"," >> config.json
          echo "  \"OPENAI_KEY\": \"$OPENAI_KEY\"," >> config.json
          echo "  \"GOOGLE_CLIENT_ID\": \"$GOOGLE_CLIENT_ID\"," >> config.json
          echo "  \"SUPABASE_URL\": \"$SUPABASE_URL\"," >> config.json
          echo "  \"SUPABASE_ANON_KEY\": \"$SUPABASE_ANON_KEY\"" >> config.json
          echo "}" >> config.json

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi --obfuscate \
          --split-debug-info=build/app/outputs/symbols \
          --dart-define-from-file=config.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CV-Maker-Pro-APKs
          path: build/app/outputs/flutter-apk/*.apk

name: Flutter Build APK

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        # እዚህ ጋር መጠኑን ለመቀነስ እና ስሙን ለመቀየር ይረዳል
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CV-Maker-Pro-APKs # የአፑ ስም እዚህ ይገለጻል
          path: build/app/outputs/flutter-apk/*.apk # ሁሉንም የተከፋፈሉ ፋይሎች እንዲያካትት
